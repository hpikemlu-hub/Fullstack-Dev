name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'fullstack-dev/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'fullstack-dev/**'

env:
  NODE_VERSION: '18'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: workload-management

jobs:
  # Code Quality and Testing
  test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./fullstack-dev
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './fullstack-dev/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Setup environment
        run: |
          cp .env.example .env.local
          echo "DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db" >> .env.local
          echo "REDIS_URL=redis://localhost:6379" >> .env.local
          echo "JWT_SECRET=test_jwt_secret_for_ci" >> .env.local
          echo "JWT_REFRESH_SECRET=test_refresh_secret_for_ci" >> .env.local

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run database migrations
        run: npm run db:deploy

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Run linting
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Run integration tests
        run: npm run test:integration

      - name: Test database connection
        run: npm run test:db

      - name: Build application
        run: npm run build

  # Security Scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./fullstack-dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './fullstack-dev/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level moderate

      - name: Check for vulnerabilities
        run: npx better-npm-audit audit --level moderate

  # Docker Build and Push
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./fullstack-dev
          file: ./fullstack-dev/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.workload.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Coolify Staging
        run: |
          # Add Coolify webhook deployment here
          curl -X POST "${{ secrets.COOLIFY_STAGING_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"image": "${{ needs.docker-build.outputs.image-tag }}"}'

      - name: Run health check
        run: |
          # Wait for deployment and run health check
          sleep 30
          curl -f "${{ vars.STAGING_URL }}/api/health" || exit 1

      - name: Run smoke tests
        working-directory: ./fullstack-dev
        run: npm run test:e2e -- --baseURL="${{ vars.STAGING_URL }}"

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://workload.kemlu.go.id

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## Changes
            ${{ github.event.head_commit.message }}
            
            ## Docker Image
            `${{ needs.docker-build.outputs.image-tag }}`
            
            ## Deployment
            - Staging: ✅ Completed
            - Production: 🚀 In Progress

      - name: Deploy to Coolify Production
        run: |
          # Add Coolify webhook deployment here
          curl -X POST "${{ secrets.COOLIFY_PRODUCTION_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"image": "${{ needs.docker-build.outputs.image-tag }}"}'

      - name: Run health check
        run: |
          # Wait for deployment and run health check
          sleep 60
          curl -f "${{ vars.PRODUCTION_URL }}/api/health" || exit 1

      - name: Notify deployment success
        run: |
          echo "🎉 Production deployment completed successfully!"
          # Add notification logic here (Slack, email, etc.)

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()

    steps:
      - name: Delete old container images
        run: |
          # Keep only the last 5 images
          echo "Cleaning up old container images..."
          # Add cleanup logic here