name: Staging Deployment

on:
  push:
    branches: [ staging, development ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-and-build:
    name: 🧪 Test & Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: |
          npx prisma generate
          npx prisma db push
          npm run test:ci

      - name: Build application
        run: |
          npm run build

  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-and-build]
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging.workload.kemlu.go.id
    steps:
      - name: Deploy to Coolify Staging
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.COOLIFY_STAGING_WEBHOOK }}
          method: 'POST'
          customHeaders: '{"Authorization": "Bearer ${{ secrets.COOLIFY_TOKEN }}"}'
          data: '{"ref": "staging", "commit": "${{ github.sha }}"}'

      - name: Health check
        run: |
          sleep 60
          curl -f https://staging.workload.kemlu.go.id/api/health || exit 1