# Clean Nixpacks Configuration for Next.js
# Node 20 + Legacy Peer Deps for Stable Build

providers = ["node"]

[phases.install]
cmds = [
  "npm ci --legacy-peer-deps --prefer-offline"
]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "npm start"

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
DATABASE_URL = "file:./production.db"
JWT_SECRET = "production-fallback-secret"
JWT_REFRESH_SECRET = "production-fallback-refresh"
