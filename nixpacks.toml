# Clean Nixpacks Configuration for Next.js
# Node 20 + Legacy Peer Deps for Stable Build

providers = ["node"]

[phases.setup]
cmds = [
  "npm cache clean --force || true",
  "rm -rf ~/.npm || true",
  "echo 'legacy-peer-deps=true' > .npmrc",
  "echo 'fund=false' >> .npmrc", 
  "echo 'audit=false' >> .npmrc",
  "echo 'registry=https://registry.npmjs.org/' >> .npmrc",
  "node --version",
  "npm --version"
]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps --frozen-lockfile --no-audit --no-fund --verbose"
]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "npm start"

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"